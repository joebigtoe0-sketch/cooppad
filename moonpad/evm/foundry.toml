[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@uniswap/v2-core/=test/vendor/uniswap/v2-core/",
    "@uniswap/lib/=test/vendor/uniswap/lib/",
]

[rpc_endpoints]
robinhood = "${ROBINHOOD_RPC_URL}"
robinhood_testnet = "${ROBINHOOD_TESTNET_RPC_URL}"
